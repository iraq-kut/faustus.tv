<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faustus Tv | البث المباشر المطور</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        :root { --bg-color: #0b1120; --card-bg: #131c31; --accent-color: #1d4ed8; --text-color: #ffffff; --border-color: #1e293b; --logo-gradient: linear-gradient(45deg, #ef4444, #f43f5e, #ec4899); --logo-glow: rgba(239, 68, 68, 0.4); }
        [data-theme="light"] { --bg-color: #f8fafc; --card-bg: #ffffff; --accent-color: #2563eb; --text-color: #0f172a; --border-color: #cbd5e1; --logo-gradient: linear-gradient(45deg, #dc2626, #e11d48, #be185d); --logo-glow: rgba(220, 38, 38, 0.15); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Tajawal', sans-serif; transition: 0.3s; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 15px; display: flex; flex-direction: column; align-items: center; }
        
        header { width: 100%; max-width: 1000px; display: flex; justify-content: space-between; align-items: center; padding-bottom: 15px; border-bottom: 1px solid var(--border-color); }
        .logo { font-size: 24px; font-weight: 800; background: var(--logo-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0px 2px 8px var(--logo-glow)); cursor: default; }
        
        .theme-switch-wrapper { display: flex; align-items: center; gap: 8px; font-size: 14px; }
        .theme-switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .theme-switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #334155; border-radius: 34px; display: flex; align-items: center; justify-content: space-between; padding: 0 5px; }
        .slider::before { content: ""; position: absolute; height: 20px; width: 20px; left: 3px; bottom: 3px; background-color: white; border-radius: 50%; transition: 0.3s; }
        input:checked + .slider { background-color: #3b82f6; }
        input:checked + .slider::before { transform: translateX(24px); }
        
        .tv-sticky-holder { position: sticky; top: 10px; width: 100%; max-width: 1000px; z-index: 999; background-color: var(--bg-color); padding-bottom: 10px; }
        .tv-frame { width: 100%; background-color: #0d1527; border: 5px solid #0d1527; border-bottom: 24px solid #0d1527; border-radius: 16px; padding: 1px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.6); position: relative; }
        
        .tv-bottom-controls { position: absolute; bottom: -17px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 6px; white-space: nowrap; pointer-events: none; }
        .tv-led-blue { width: 5px; height: 5px; background-color: #3b82f6; border-radius: 50%; box-shadow: 0 0 8px #3b82f6, 0 0 3px #3b82f6; }
        .tv-brand-text { color: #64748b; font-size: 10px; font-weight: 800; letter-spacing: 1.5px; font-family: system-ui, -apple-system, sans-serif; }
        
        .screen { width: 100%; aspect-ratio: 16 / 9; border-radius: 10px; overflow: hidden; background: #000; }
        video { width: 100%; height: 100%; object-fit: contain; }
        
        .scrollable-content { width: 100%; max-width: 1000px; display: flex; flex-direction: column; align-items: center; }
        .news-ticker-wrapper { width: 100%; margin-top: 15px; display: flex; align-items: center; gap: 6px; height: 36px; overflow: hidden; }
        .ticker-label-fixed { background-color: #b91c1c; color: #fff; padding: 0 10px; height: 100%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 13px; border-radius: 18px 6px 6px 18px; min-width: 115px; max-width: 125px; white-space: nowrap; box-shadow: 0 2px 6px rgba(185, 28, 28, 0.3); text-align: center; }
        .bottom-info-bar-main { flex: 1; background-color: var(--accent-color); color: #fff; border-radius: 6px 18px 18px 6px; display: flex; align-items: center; overflow: hidden; height: 100%; }
        .ticker-move-text { display: inline-block; white-space: nowrap; padding-right: 100%; animation: bottomTicker 18s linear infinite; font-size: 13px; font-weight: 600; }
        @keyframes bottomTicker { 100% { transform: translate3d(100%, 0, 0); } }
        
        .categories { width: 100%; display: flex; gap: 8px; overflow-x: auto; margin-top: 15px; padding-bottom: 5px; scrollbar-width: none; }
        .categories::-webkit-scrollbar { display: none; }
        .cat-btn { background: var(--card-bg); color: var(--text-color); border: 1px solid var(--border-color); padding: 8px 16px; border-radius: 15px; cursor: pointer; font-weight: 600; font-size: 13px; white-space: nowrap; flex-shrink: 0; }
        .cat-btn.active { background: var(--accent-color); border-color: var(--accent-color); color: #fff; }
        
        .channels-grid { width: 100%; display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; margin-top: 12px; margin-bottom: 40px; }
        .channel-card { background: var(--card-bg); border: 2px solid var(--border-color); border-radius: 14px; padding: 12px; text-align: center; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .channel-card.active { border-color: var(--accent-color); box-shadow: 0 0 10px rgba(29, 78, 216, 0.2); }
        .channel-logo { width: 70px; height: 70px; border-radius: 50%; margin-bottom: 8px; overflow: hidden; border: 2px solid var(--border-color); background: #050b14; }
        .channel-logo img { width: 100%; height: 100%; object-fit: cover; }
        
        .channel-name-wrapper { display: flex; align-items: center; justify-content: center; gap: 6px; font-weight: 700; font-size: 14px; }
        
        .live-waves { display: none; align-items: flex-end; gap: 2px; height: 11px; }
        .active .live-waves { display: flex; }
        .wave { width: 2px; background-color: #ef4444; border-radius: 1px; animation: sound 1.2s infinite ease-in-out; }
        .wave:nth-child(1) { height: 50%; animation-delay: 0.1s; }
        .wave:nth-child(2) { height: 100%; animation-delay: 0.3s; }
        .wave:nth-child(3) { height: 40%; animation-delay: 0.5s; }
        @keyframes sound { 0% { transform: scaleY(0.4); } 50% { transform: scaleY(1); } 100% { transform: scaleY(0.4); } }
    </style>
</head>
<body>
    <header>
        <div class="logo">Faustus Tv</div>
        <div class="theme-switch-wrapper">
            <span id="mode-text">الوضع الليلي</span>
            <label class="theme-switch"><input type="checkbox" id="checkbox" /><div class="slider"><span>🌙</span><span>☀️</span></div></label>
        </div>
    </header>

    <div class="tv-sticky-holder">
        <div class="tv-frame">
            <div class="screen">
                <video id="videoPlayer" controls autoplay muted playsinline x-webkit-airplay="allow"></video>
            </div>
            <div class="tv-bottom-controls">
                <div class="tv-led-blue"></div>
                <div class="tv-brand-text">FAUSTUS TV</div>
            </div>
        </div>
    </div>

    <div class="scrollable-content">
        <div class="news-ticker-wrapper">
            <div class="ticker-label-fixed" id="fixedLabel">جاري التحميل...</div>
            <div class="bottom-info-bar-main">
                <div class="ticker-move-text" id="movingTickerText">منصة رائد الرقمية تقدم لكم البث المباشر بأعلى دقة واستقرار...</div>
            </div>
        </div>

        <div class="categories">
            <button class="cat-btn active" id="btn-sports" onclick="filterChannels('sports')">الرياضية</button>
            <button class="cat-btn" id="btn-news" onclick="filterChannels('news')">إخبارية</button>
            <button class="cat-btn" id="btn-iraq" onclick="filterChannels('iraq')">العراقية</button>
        </div>

        <div class="channels-grid" id="channelsGrid"></div>
    </div>

    <script>
        let hlsInstance = null;

        const channelsData = [
            { name: "الجزيرة", category: "news", logo: "https://f.top4top.io/p_3791b84ns1.png", streamUrl: "https://live-hls-web-ajm-bp.thehlive.com/AJM/02.m3u8" },
            { name: "العربية", category: "news", logo: "https://h.top4top.io/p_3791vnx6k3.png", streamUrl: "https://atv-live-hls.secure.footprint.net/AlArabiya/index.m3u8" },
            { name: "الحدث", category: "news", logo: "https://i.top4top.io/p_379154cch4.jpg", streamUrl: "https://atv-live-hls.secure.footprint.net/AlHadath/index.m3u8" },
            { name: "العراقية", category: "iraq", logo: "https://c.top4top.io/p_37145dokb1.jpg", streamUrl: "https://imn.gcdn.co/imnnews/index.m3u8" },
            { name: "الشرقية", category: "iraq", logo: "https://l.top4top.io/p_3791xboxw0.jpg", streamUrl: "https://vcp.rtmcdn.com/live/sharqiya/index.m3u8" },
            { name: "السومرية", category: "iraq", logo: "https://b.top4top.io/p_3074zfmcx6.jpg", streamUrl: "https://sumaria.gcdn.co/alsumaria/index.m3u8" },
            { name: "UTV", category: "iraq", logo: "https://h.top4top.io/p_3761fub101.png", streamUrl: "https://sumaria.gcdn.co/alsumaria/index.m3u8" },
            { name: "الرشيد", category: "iraq", logo: "https://c.top4top.io/p_3791cp3dy0.jpg", streamUrl: "https://sumaria.gcdn.co/alsumaria/index.m3u8" },
            { name: "mbc iraq", category: "iraq", logo: "https://i.top4top.io/p_37851ymwh0.jpg", streamUrl: "https://sumaria.gcdn.co/alsumaria/index.m3u8" },
            { name: "دجلة", category: "iraq", logo: "https://k.top4top.io/p_3074gmpa73.png", streamUrl: "https://sumaria.gcdn.co/alsumaria/index.m3u8" },
            { name: "الشرقية نيوز", category: "iraq", logo: "https://h.top4top.io/p_3761x7x0e1.png", streamUrl: "https://vcp.rtmcdn.com/live/sharqiyalive/index.m3u8" },
            { name: "الكأس 1", category: "sports", logo: "https://up6.cc/2026/05/177874198317771.jpg", streamUrl: "https://liveeu-gcp.alkassdigital.net/alkass1-p/main.m3u8" },
            { name: "الكأس 2", category: "sports", logo: "https://up6.cc/2026/05/177874198317771.jpg", streamUrl: "https://liveeu-gcp.alkassdigital.net/alkass2-p/main.m3u8" },
            { name: " العراقية", category: "sports", logo: "https://d.top4top.io/p_3761r54vt1.jpg", streamUrl: "https://tv.vodu.me:1935/live/iraqia-sport/tracks-v1a1/mono.m3u8" },
            { name: " 1الثامنة", category: "sports", logo: "https://l.top4top.io/p_3761l3qk51.png", streamUrl: "https://tv.vodu.me:1995/live/thmanyah-1/tracks-v1a1/mono.m3u8" }, 
            { name: " 2الثامنة", category: "sports", logo: "https://k.top4top.io/p_3761948v40.png", streamUrl: "https://tv.vodu.me:1995/live/thmanyah-2/tracks-v1a1/mono.m3u8" },  
            { name: " 3الثامنة", category: "sports", logo: "https://a.top4top.io/p_3761vv1th0.png", streamUrl: "https://tv.vodu.me:1995/live/thmanyah-3/tracks-v1a1/mono.m3u8" },       
            { name: " bin sport 1", category: "sports", logo: "https://b.top4top.io/p_37759rwfm0.png", streamUrl: "http://45.67.56.78/Sport1/index.fmp4.m3u8" },       
            { name: " bin sport 2", category: "sports", logo: "https://k.top4top.io/p_3761pu1ki2.png", streamUrl: "http://45.67.56.78/Sport2/embed.html" },       
            { name: " bin sport 3", category: "sports", logo: "https://l.top4top.io/p_3761rodb03.png", streamUrl: "https://tv.vodu.me:1995/live/thmanyah-3/tracks-v1a1/mono.m3u8" },       
            { name: " bin sport 4", category: "sports", logo: "https://a.top4top.io/p_3761fha954.png", streamUrl: "https://tv.vodu.me:1995/live/thmanyah-1/tracks-v1a1/mono.m3u8" },       
            { name: "سكاي نيوز", category: "news", logo: "https://up6.cc/2026/05/177923891400141.jpg", streamUrl: "https://skynewsarabia-live.akamaized.net/hls/live/2004523/snaservice/01.m3u8" },
            { name: "بي بي سي", category: "news", logo: "https://j.top4top.io/p_3791sccp15.png", streamUrl: "https://bbc-arabic.live.m3u8.xyz/bbcarabic/index.m3u8" },
            { name: "روسيا اليوم", category: "news", logo: "https://k.top4top.io/p_3791wh4y56.jpg", streamUrl: "https://rt-arabic.live.m3u8.xyz/rtarabic/index.m3u8" }
        ];

        let state = 0; 
        let currentTemp = "🌙 الكوت: --°C"; 

        async function fetchRealWeather() {
            try {
                const response = await fetch("https://api.open-meteo.com/v1/forecast?latitude=32.5028&longitude=45.8211&current_weather=true");
                const data = await response.json();
                if (data && data.current_weather) {
                    const temp = Math.round(data.current_weather.temperature);
                    const code = data.current_weather.weathercode;
                    const isDay = data.current_weather.is_day; 
                    
                    let icon = isDay ? "☀️" : "🌙"; 
                    if (code >= 1 && code <= 3) icon = isDay ? "⛅" : "☁️"; 
                    else if (code >= 45 && code <= 67) icon = "🌧️";
                    else if (code >= 71 && code <= 86) icon = "❄️";
                    else if (code >= 95) icon = "⛈️";

                    currentTemp = `${icon} الكوت: ${temp}°C`;
                }
            } catch (error) {
                const hour = new Date().getHours();
                const fallbackIcon = (hour >= 6 && hour < 18) ? "☀️" : "🌙";
                currentTemp = `${fallbackIcon} الكوت: 34°C`;
            }
        }

        fetchRealWeather();
        setInterval(fetchRealWeather, 1800000);

        function updateTicker() {
            const now = new Date();
            const currentSeconds = Math.floor(now.getTime() / 1000);
            if (currentSeconds % 5 === 0) state = Math.floor((currentSeconds % 15) / 5);

            const dateStr = now.toLocaleDateString('ar-IQ', { year: 'numeric', month: '2-digit', day: '2-digit' });
            const timeStr = now.toLocaleTimeString('ar-IQ', { hour: '2-digit', minute: '2-digit' });

            const displays = [currentTemp, dateStr, timeStr];
            document.getElementById('fixedLabel').textContent = displays[state];
        }
        setInterval(updateTicker, 1000);
        updateTicker();

        // دالة التشغيل الذكية المتوافقة تماماً مع آبل وسفاري وجيتهب بيجز بالكامل
        function playStream(url) {
            const video = document.getElementById('videoPlayer');
            
            if (hlsInstance) {
                hlsInstance.destroy();
                hlsInstance = null;
            }

            // إذا كان المستخدم على جهاز آيفون أو آيباد أو متصفح سفاري، نقوم بتشغيل البث محلياً فوراً بدون وسيط لتخطي قيود الحماية
            if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.play().catch(() => {
                    video.muted = true;
                    video.play().catch(err => console.log("خطأ تشغيل على الآيفون:", err));
                });
            } 
            // لبقية الأجهزة ومتصفحات الكروم/الأندرويد، نستخدم مكتبة HLS السريعة
            else if (Hls.isSupported()) {
                hlsInstance = new Hls({
                    maxBufferLength: 2,
                    maxMaxBufferLength: 5,
                    enableWorker: true,
                    lowLatencyMode: true
                });
                hlsInstance.loadSource(url);
                hlsInstance.attachMedia(video);
                hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play().catch(() => { video.muted = true; video.play(); });
                });
                hlsInstance.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) {
                        video.src = url;
                        video.play().catch(() => {});
                    }
                });
            } else {
                video.src = url;
                video.play().catch(() => { video.muted = true; video.play(); });
            }
        }

        function displayChannels(filter) {
            const grid = document.getElementById('channelsGrid');
            grid.innerHTML = '';
            const filtered = channelsData.filter(c => c.category === filter);
            
            filtered.forEach((ch, i) => {
                const card = document.createElement('div');
                card.className = `channel-card ${i === 0 ? 'active' : ''}`;
                card.innerHTML = `
                    <div class="channel-logo"><img src="${ch.logo}"></div>
                    <div class="channel-name-wrapper">
                        <span>${ch.name}</span>
                        <div class="live-waves">
                            <div class="wave"></div><div class="wave"></div><div class="wave"></div>
                        </div>
                    </div>
                `;
                card.onclick = () => {
                    document.querySelectorAll('.channel-card').forEach(c => c.classList.remove('active'));
                    card.classList.add('active');
                    playStream(ch.streamUrl);
                };
                grid.appendChild(card);
            });
            if(filtered.length > 0) playStream(filtered[0].streamUrl);
        }

        function filterChannels(cat) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            const targetBtn = document.getElementById(`btn-${cat}`);
            if(targetBtn) targetBtn.classList.add('active');
            displayChannels(cat);
        }

        displayChannels('sports');

        document.getElementById('checkbox').addEventListener('change', (e) => {
            document.documentElement.setAttribute('data-theme', e.target.checked ? 'light' : 'dark');
            document.getElementById('mode-text').textContent = e.target.checked ? "الوضع النهاري" : "الوضع الليلي";
        });
    </script>
</body>
</html>
